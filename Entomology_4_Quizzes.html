  <div class="quiz-header" style="background:linear-gradient(135deg,#0f172a,#334155)">
    <button class="back-btn" data-action="home">← All Quizzes</button>
    <h1>📖 Entomology Study Guide &amp; Reference</h1>
    <p>17 reference sections · Orders, Families, Anatomy, Ecology, ID Tips &amp; more</p>
  </div>
  <div class="guide-nav">
    ${GUIDE_SECTIONS.map((s,i)=>`<button data-guide-nav="${s.id}">${s.title}</button>`).join('')}
  </div>
  ${GUIDE_SECTIONS.map(s=>`
    <div class="guide-section" id="guide-${s.id}">
      <h2>${s.title}</h2>
      ${s.html}
    </div>
  `).join('')}
  <div style="text-align:center;margin:40px 0 20px;padding:24px;border-radius:14px;background:#f8fafc;border:2px solid var(--border)">
    <p style="font-size:14px;color:var(--muted);margin-bottom:14px">Ready to test your knowledge?</p>
    <button class="guide-link" data-action="home" style="background:linear-gradient(135deg,#8b0000,#b91c1c)">🔬 Take a Quiz</button>
    <p style="font-size:12px;color:var(--muted);margin-top:14px">💡 Tip: Print this page (Ctrl/Cmd+P) for a physical reference sheet</p>
  </div>`;
}

function bindGuide(){
  document.querySelectorAll('[data-action="home"]').forEach(el=>el.onclick=()=>{state.view="landing";render();});
  document.querySelectorAll('[data-guide-nav]').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.guideNav;
      document.getElementById('guide-'+id)?.scrollIntoView({behavior:'smooth',block:'start'});
      document.querySelectorAll('.guide-nav button').forEach(b=>b.classList.remove('active'));
      el.classList.add('active');
    };
  });
}

// ===== RENDER =====
function render(){
  const app=document.getElementById('app');
  if(state.view==="landing"){app.innerHTML=renderLanding();bindLanding();startTimerUpdates();}
  else if(state.view==="guide"){app.innerHTML=renderGuide();bindGuide();}
  else if(state.mode==="quiz"){app.innerHTML=renderQuiz();bindQuiz();startTimerUpdates();}
  else{app.innerHTML=renderReview();bindReview();}
  window.scrollTo(0,0);
}

function renderLanding(){
  return `
  <div class="landing">
    <h1>Science Olympiad Entomology</h1>
    <p class="sub">4 Practice Quizzes · ~400 Questions · 50/50 Easy/Hard · Timed Answers</p>
    <div class="quiz-grid">
      ${QUIZZES.map((q,i)=>`
        <button class="quiz-card q${q.id}" data-idx="${i}">
          <span class="qc-icon">${q.icon}</span>
          <div class="qc-title">${q.title}</div>
          <div class="qc-desc">${q.desc}</div>
          <div class="qc-count">${q.stations.reduce((s,st)=>s+st.questions.length,0)} QUESTIONS · ${q.stations.length} STATIONS</div>
        </button>
      `).join('')}
      <button class="guide-card" data-action="guide">
        <span class="qc-icon">📖</span>
        <div class="qc-title">Study Guide &amp; Reference</div>
        <div class="qc-desc">Complete reference: 20+ orders, 70+ families, anatomy, antenna types, mouthparts, wing types, leg modifications, ecology, disease vectors, taxonomy &amp; quick ID tips</div>
        <div class="qc-count">17 REFERENCE SECTIONS · PRINTABLE</div>
      </button>
    </div>
  </div>`;
}

function renderQuiz(){
  const quiz=QUIZZES[state.quizIdx];
  const station=quiz.stations[state.stationIdx];
  const stats=getStats(state.quizIdx);
  const tc=stats.reduce((s,x)=>s+x.correct,0);
  const tg=stats.reduce((s,x)=>s+x.graded,0);
  const total=quiz.stations.reduce((s,st)=>s+st.questions.length,0);

  return `
  <div class="quiz-header" style="background:${quiz.gradient}">
    <button class="back-btn" data-action="home">← All Quizzes</button>
    <h1>${quiz.icon} ${quiz.title}</h1>
    <p>${total} questions · ${quiz.stations.length} stations · 60s timer per question</p>
    ${tg>0?`<div class="score-bar"><span>📝 ${tg}/${total}</span><span>✅ ${tc}</span><span>📊 ${tg>0?Math.round(tc/tg*100):0}%</span></div>`:''}
  </div>

  <div class="station-tabs">
    ${quiz.stations.map((st,si)=>{
      const s=stats[si];
      const active=si===state.stationIdx;
      const done=s.revealed===s.total;
      return `<button class="station-tab ${active?'active':''} ${done&&!active?'done':''}" data-station="${si}" style="${active?'background:'+quiz.gradient:''}">
        ${st.icon} ${si+1}
        ${s.revealed>0&&!active?`<span class="badge" style="background:${quiz.color}">${s.correct}</span>`:''}
      </button>`;
    }).join('')}
  </div>

  <div class="station-header">
    <div>
      <h2>${station.icon} ${station.name}</h2>
      <span class="meta">${station.questions.length} questions · ${stats[state.stationIdx].correct}/${stats[state.stationIdx].revealed} correct</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${(stats[state.stationIdx].revealed/station.questions.length)*100}%;background:${quiz.gradient}"></div></div>
  </div>

  ${station.questions.map((q,qi)=>{
    const key=`${state.stationIdx}-${qi}`;
    const s=state.qStates[key]||{};
    const dc=q.d==="easy"?"#16a34a":"#dc2626";
    const db=q.d==="easy"?"#f0fdf4":"#fef2f2";

    return `<div class="q-card ${s.revealed?(s.correct===true?'correct':s.correct===false?'wrong':'neutral'):''}" data-timer="${key}">
      <div class="q-top">
        <div style="flex:1">
          <span class="q-label">Q${qi+1}</span>
          <span class="diff-badge ${q.d==='easy'?'diff-easy':'diff-hard'}">${q.d==='easy'?'EASY':'HARD'}</span>
          <div class="q-text">${q.q}</div>
        </div>
        ${!s.revealed&&s.timerStart?`
          <svg width="48" height="48" viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="18" fill="none" stroke="#e5e7eb" stroke-width="4"/>
            <circle class="timer-track" cx="24" cy="24" r="18" fill="none" stroke="#16a34a" stroke-width="4" stroke-dasharray="${2*Math.PI*18}" stroke-dashoffset="0" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .5s linear"/>
            <text class="timer-text" x="24" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">60</text>
          </svg>
        `:''}
        ${s.revealed?`<div class="result-icon" style="background:${s.correct===true?'#22c55e':s.correct===false?'#ef4444':'#94a3b8'}">${s.correct===true?'✓':s.correct===false?'✗':'—'}</div>`:''}
      </div>
      <textarea class="q-input" data-key="${key}" placeholder="Type your answer..." ${s.revealed?'disabled':''}>${s.userAnswer||''}</textarea>
      ${!s.revealed?`
        <div class="reveal-row">
          <button class="reveal-btn" data-reveal="${key}" disabled style="background:${quiz.gradient};box-shadow:0 2px 8px ${quiz.color}40">Wait 60s</button>
          <span class="reveal-hint">Try to answer first!</span>
        </div>
      `:`
        <div class="answer-box"><strong style="color:${quiz.accent}">Answer:</strong> ${q.a}</div>
      `}
      ${s.grading&&s.correct===null?`
        <div class="grade-row">
          <span>How'd you do?</span>
          <button class="grade-btn grade-right" data-grade="${key}" data-val="true">✓ Right</button>
          <button class="grade-btn grade-wrong" data-grade="${key}" data-val="false">✗ Wrong</button>
        </div>
      `:''}
    </div>`;
  }).join('')}

  <div class="nav-row">
    <button class="nav-btn dark" data-nav="prev" ${state.stationIdx===0?'disabled':''}>← Previous</button>
    <button class="nav-btn" data-nav="next" style="background:${state.stationIdx===quiz.stations.length-1?'#e2e8f0':quiz.gradient};color:${state.stationIdx===quiz.stations.length-1?'#94a3b8':'#fff'}" ${state.stationIdx===quiz.stations.length-1?'disabled':''}>Next →</button>
  </div>
  <div class="footer-box">
    <button class="all-btn" data-action="review">📋 See All Questions & Answers</button>
    <p>Complete answer key — all ${total} questions</p>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid #cbd5e1">
      <button class="guide-link" data-action="guide">📖 Open Study Guide</button>
    </div>
  </div>`;
}

function renderReview(){
  const quiz=QUIZZES[state.quizIdx];
  return `
  <div class="review-header">
    <h1 style="color:${quiz.color}">📋 ${quiz.title} — All Answers</h1>
    <button class="nav-btn dark" data-action="back-quiz">← Back to Quiz</button>
  </div>
  ${quiz.stations.map((st,si)=>`
    <div class="review-station">
      <h2 style="background:${quiz.gradient}">${st.icon} ${st.name}</h2>
      ${st.questions.map((q,qi)=>`
        <div class="review-item">
          <div class="ri-q">
            Q${qi+1}: <span class="diff-badge ${q.d==='easy'?'diff-easy':'diff-hard'}" style="vertical-align:middle">${q.d==='easy'?'EASY':'HARD'}</span>
            ${q.q}
          </div>
          <div class="ri-a">💡 ${q.a}</div>
        </div>
      `).join('')}
    </div>
  `).join('')}
  <div style="text-align:center;margin:30px 0">
    <button class="nav-btn dark" data-action="back-quiz" style="padding:14px 30px;font-size:15px">← Back to Quiz</button>
    <button class="nav-btn dark" data-action="home" style="padding:14px 30px;font-size:15px;margin-left:10px">🏠 All Quizzes</button>
    <button class="guide-link" data-action="guide" style="margin-left:10px">📖 Study Guide</button>
  </div>`;
}

// ===== EVENT BINDING =====
function bindLanding(){
  document.querySelectorAll('.quiz-card').forEach(el=>el.onclick=()=>{
    state.view="quiz";state.quizIdx=+el.dataset.idx;state.stationIdx=0;state.mode="quiz";
    state.qStates=initQuizStates(state.quizIdx);render();
  });
  document.querySelectorAll('[data-action="guide"]').forEach(el=>el.onclick=()=>{state.view="guide";render();});
}

function bindQuiz(){
  document.querySelectorAll('[data-action="home"]').forEach(el=>el.onclick=()=>{state.view="landing";render();});
  document.querySelectorAll('[data-action="review"]').forEach(el=>el.onclick=()=>{state.mode="review";render();});
  document.querySelectorAll('[data-action="guide"]').forEach(el=>el.onclick=()=>{state.view="guide";render();});

  document.querySelectorAll('.station-tab').forEach(el=>el.onclick=()=>{
    state.stationIdx=+el.dataset.station;render();
  });

  document.querySelectorAll('.q-input').forEach(el=>{
    el.oninput=()=>{
      const k=el.dataset.key,s=state.qStates[k];
      s.userAnswer=el.value;
      if(!s.timerStart)s.timerStart=Date.now();
    };
  });

  document.querySelectorAll('[data-reveal]').forEach(el=>{
    el.onclick=()=>{
      const k=el.dataset.reveal,s=state.qStates[k];
      const sec=s.timerStart?Math.max(0,60-Math.floor((Date.now()-s.timerStart)/1000)):60;
      if(sec>0)return;
      s.revealed=true;s.grading=true;render();
    };
  });

  document.querySelectorAll('[data-grade]').forEach(el=>{
    el.onclick=()=>{
      const k=el.dataset.grade,v=el.dataset.val==="true";
      state.qStates[k].correct=v;state.qStates[k].grading=false;render();
    };
  });

  document.querySelectorAll('[data-nav="prev"]').forEach(el=>el.onclick=()=>{
    if(state.stationIdx>0){state.stationIdx--;render();}
  });
  document.querySelectorAll('[data-nav="next"]').forEach(el=>el.onclick=()=>{
    const max=QUIZZES[state.quizIdx].stations.length-1;
    if(state.stationIdx<max){state.stationIdx++;render();}
  });
}

function bindReview(){
  document.querySelectorAll('[data-action="back-quiz"]').forEach(el=>el.onclick=()=>{state.mode="quiz";render();});
  document.querySelectorAll('[data-action="home"]').forEach(el=>el.onclick=()=>{state.view="landing";render();});
  document.querySelectorAll('[data-action="guide"]').forEach(el=>el.onclick=()=>{state.view="guide";render();});
}

// ===== INIT =====
render();
</script>
</body>
</html>
