<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Olympiad Entomology — 6 Practice Quizzes 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafaf9;--card:#fff;--text:#1c1917;--muted:#78716c;--border:#e7e5e4;--radius:14px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.container{max-width:820px;margin:0 auto;padding:20px 16px}

/* LANDING */
.landing{text-align:center;padding:60px 20px}
.landing h1{font-family:'DM Serif Display',serif;font-size:clamp(32px,5vw,48px);letter-spacing:-1px;margin-bottom:8px}
.landing .sub{color:var(--muted);font-size:15px;margin-bottom:40px}
.quiz-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin:0 auto;max-width:900px}
.quiz-card{border-radius:var(--radius);padding:28px 24px;color:#fff;cursor:pointer;transition:transform .2s,box-shadow .2s;text-align:left;border:none;font-family:inherit;position:relative;overflow:hidden}
.quiz-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.2)}
.quiz-card .qc-icon{font-size:32px;margin-bottom:12px;display:block}
.quiz-card .qc-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:6px}
.quiz-card .qc-desc{font-size:12px;opacity:.85;line-height:1.5}
.quiz-card .qc-count{margin-top:12px;font-size:11px;font-weight:700;opacity:.7;letter-spacing:1px;text-transform:uppercase}
.q1{background:linear-gradient(135deg,#8b0000,#b91c1c)}
.q2{background:linear-gradient(135deg,#1e3a8a,#2563eb)}
.q3{background:linear-gradient(135deg,#14532d,#16a34a)}
.q4{background:linear-gradient(135deg,#581c87,#a855f7)}
.q5{background:linear-gradient(135deg,#134e4a,#14b8a6)}
.q6{background:linear-gradient(135deg,#7c2d12,#ea580c)}

/* QUIZ VIEW */
.quiz-view{display:none}
.quiz-view.active{display:block}

/* HEADER */
.quiz-header{border-radius:var(--radius);padding:22px 26px;color:#fff;margin-bottom:20px;position:relative;display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.quiz-header h1{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:4px;flex:1}
.quiz-header p{font-size:13px;opacity:.85}
.score-display{background:rgba(255,255,255,.15);border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;white-space:nowrap}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px;font-family:inherit}
.back-btn:hover{background:rgba(255,255,255,.35)}

/* SECTION */
.section{margin-bottom:32px;background:var(--card);border-radius:var(--radius);padding:24px;border:2px solid var(--border)}
.section-title{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:20px;color:var(--text)}
.section-number{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

/* QUESTION CARD */
.q-card{background:#f8fafc;border-radius:12px;padding:18px 20px;margin-bottom:16px;border:2px solid var(--border);transition:all .3s}
.q-card.revealed.correct{background:#f0fdf4;border-color:#86efac}
.q-card.revealed.wrong{background:#fef2f2;border-color:#fca5a5}
.q-text{font-size:15px;line-height:1.6;font-weight:500;margin-bottom:14px;color:var(--text)}
.q-number{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}

/* OPTION CARD */
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid #d1d5db;border-radius:10px;cursor:pointer;transition:all .2s;background:#fff}
.option:hover{border-color:#94a3b8;background:#f1f5f9}
.option input[type="radio"]{cursor:pointer;flex-shrink:0}
.option label{cursor:pointer;flex:1;font-size:14px;user-select:none;display:flex;align-items:center;gap:8px}
.option.selected{border-color:#2563eb;background:#eff6ff}
.option.revealed.correct{border-color:#16a34a;background:#f0fdf4}
.option.revealed.wrong{border-color:#dc2626;background:#fef2f2}
.option.revealed.correct label{color:#16a34a;font-weight:600}
.option.revealed.wrong label{color:#dc2626;font-weight:600}

/* ANSWER DISPLAY */
.answer-display{margin-top:12px;padding:10px 14px;border-radius:8px;background:#f0fdf4;border-left:3px solid #16a34a;font-size:13px;line-height:1.5}
.answer-display strong{color:#15803d;font-weight:600}

/* REVEAL BUTTON */
.reveal-row{margin-top:20px;padding-top:20px;border-top:2px solid var(--border);text-align:center}
.reveal-btn{padding:12px 32px;border-radius:10px;border:none;font-weight:700;font-size:14px;cursor:pointer;color:#fff;font-family:inherit;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.reveal-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.reveal-btn:disabled{opacity:.5;cursor:not-allowed}

/* QUIZ COMPLETE */
.quiz-complete{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border-radius:var(--radius);padding:40px 30px;text-align:center;border:2px solid #86efac;margin-top:32px}
.quiz-complete h2{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:8px;color:#15803d}
.quiz-complete p{font-size:16px;color:#16a34a;margin-bottom:4px}
.quiz-complete .final-score{font-size:32px;font-weight:800;color:#15803d;margin:16px 0}
.quiz-complete button{padding:14px 40px;border-radius:10px;border:none;background:linear-gradient(135deg,#15803d,#16a34a);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;margin-top:20px;box-shadow:0 4px 12px rgba(22,163,74,.3)}
.quiz-complete button:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(22,163,74,.4)}

/* UTILITY */
.hidden{display:none}
@media(max-width:600px){
.container{padding:12px 10px}
.quiz-header{flex-direction:column;align-items:flex-start}
.score-display{align-self:flex-start}
.q-card{padding:14px 16px}
.options{gap:6px}
.option{padding:10px 12px;font-size:13px}
}
</style>
</head>

// STATE
let currentQuizId = null;
let quizState = {};

// INIT
function init() {
  renderLanding();
}

function renderLanding() {
  currentQuizId = null;
  const html = `
    <div class="landing">
      <h1>Science Olympiad Entomology</h1>
      <p class="sub">6 Practice Quizzes - 20 Questions Each</p>
      <div class="quiz-grid">
        ${QUIZZES.map(q => `
          <button class="quiz-card q${q.id}" onclick="startQuiz(${q.id})">
            <span class="qc-icon">${q.icon}</span>
            <div class="qc-title">${q.title}</div>
            <div class="qc-desc">${q.desc}</div>
            <div class="qc-count">20 Questions</div>
          </button>
        `).join('')}
      </div>
    </div>
  `;
  document.getElementById('app').innerHTML = html;
}

function startQuiz(qid) {
  currentQuizId = qid;
  const quiz = QUIZZES.find(q => q.id === qid);

  quizState[qid] = {
    score: 0,
    sectionScores: [],
    answers: {},
    revealed: {}
  };

  // Initialize all answers as unanswered
  quiz.sections.forEach((sec, si) => {
    sec.questions.forEach((q, qi) => {
      const key = `${si}-${qi}`;
      quizState[qid].answers[key] = null;
    });
    quizState[qid].sectionScores[si] = { correct: 0, total: sec.questions.length, revealed: false };
    quizState[qid].revealed[si] = false;
  });

  renderQuiz(qid);
}

function renderQuiz(qid) {
  const quiz = QUIZZES.find(q => q.id === qid);
  const state = quizState[qid];

  let totalCorrect = 0;
  quiz.sections.forEach((sec, si) => {
    if (state.revealed[si]) {
      totalCorrect += state.sectionScores[si].correct;
    }
  });

  const html = `
    <div class="quiz-view active">
      <div class="quiz-header" style="background: ${quiz.gradient}">
        <div>
          <h1>${quiz.title}</h1>
          <p>${quiz.sections.length} sections × 5 questions</p>
        </div>
        <div class="score-display">Score: <strong>${totalCorrect}/${quiz.sections.reduce((acc, sec) => acc + sec.questions.length, 0)}</strong></div>
        <button class="back-btn" onclick="goBack()">← Back</button>
      </div>

      ${quiz.sections.map((sec, si) => renderSection(qid, si, quiz, sec)).join('')}

      ${allSectionsRevealed(qid) ? `
        <div class="quiz-complete">
          <h2>Quiz Complete!</h2>
          <div class="final-score">${totalCorrect} / ${quiz.sections.reduce((acc, sec) => acc + sec.questions.length, 0)}</div>
          <p>${Math.round(totalCorrect / quiz.sections.reduce((acc, sec) => acc + sec.questions.length, 0) * 100)}%</p>
          <button onclick="goBack()">Back to Quizzes</button>
        </div>
      ` : ''}
    </div>
  `;

  document.getElementById('app').innerHTML = html;
}

function renderSection(qid, sectionIdx, quiz, section) {
  const state = quizState[qid];
  const isRevealed = state.revealed[sectionIdx];

  const html = `
    <div class="section">
      <div class="section-number">Section ${sectionIdx + 1}</div>
      <div class="section-title">${section.name}</div>

      ${section.questions.map((q, qi) => {
        const key = `${sectionIdx}-${qi}`;
        const userAns = state.answers[key];
        const correct = q.ans;
        const isCorrect = userAns === correct;

        return `
          <div class="q-card ${isRevealed ? (isCorrect ? 'revealed correct' : 'revealed wrong') : ''}">
            <div class="q-number">Question ${qi + 1}</div>
            <div class="q-text">${q.q}</div>
            <div class="options">
              ${q.opts.map((opt, oi) => {
                const selected = userAns === oi;
                const revealedClass = isRevealed ? (oi === correct ? 'correct' : (selected && oi !== correct ? 'wrong' : '')) : '';

                return `
                  <div class="option ${selected ? 'selected' : ''} ${isRevealed ? 'revealed ' + revealedClass : ''}">
                    <input type="radio" name="q${key}" value="${oi}" ${selected ? 'checked' : ''} ${isRevealed ? 'disabled' : ''} onchange="selectAnswer(${qid}, ${sectionIdx}, ${qi}, ${oi})">
                    <label>${String.fromCharCode(65 + oi)}) ${opt}</label>
                  </div>
                `;
              }).join('')}
            </div>
            ${isRevealed ? `<div class="answer-display"><strong>Correct:</strong> ${String.fromCharCode(65 + correct)}) ${q.opts[correct]}</div>` : ''}
          </div>
        `;
      }).join('')}

      <div class="reveal-row">
        ${!isRevealed ? `
          <button class="reveal-btn" style="background: ${quiz.gradient}; box-shadow: 0 2px 8px ${quiz.color}40;" onclick="revealSection(${qid}, ${sectionIdx})">
            Reveal Answers
          </button>
        ` : `
          <div style="text-align: center;">
            <strong>Section Score: ${state.sectionScores[sectionIdx].correct}/${state.sectionScores[sectionIdx].total}</strong>
          </div>
        `}
      </div>
    </div>
  `;

  return html;
}

function selectAnswer(qid, sectionIdx, questionIdx, optionIdx) {
  const key = `${sectionIdx}-${questionIdx}`;
  quizState[qid].answers[key] = optionIdx;
}

function revealSection(qid, sectionIdx) {
  const quiz = QUIZZES.find(q => q.id === qid);
  const section = quiz.sections[sectionIdx];
  const state = quizState[qid];

  let correct = 0;
  section.questions.forEach((q, qi) => {
    const key = `${sectionIdx}-${qi}`;
    if (state.answers[key] === q.ans) {
      correct++;
    }
  });

  state.sectionScores[sectionIdx].correct = correct;
  state.revealed[sectionIdx] = true;

  renderQuiz(qid);
}

function allSectionsRevealed(qid) {
  const quiz = QUIZZES.find(q => q.id === qid);
  const state = quizState[qid];
  return quiz.sections.every((_, si) => state.revealed[si]);
}

function goBack() {
  renderLanding();
}

init();
</script>
